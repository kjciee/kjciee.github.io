name: Build and deploy Pages from Shift_JIS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Convert Shift_JIS files to UTF-8
        shell: bash
        run: |
          set -e

          mkdir -p dist

          # src 以下を丸ごと dist にコピー
          cp -R src/. dist/

          # HTML/CSS/JS を Shift_JIS -> UTF-8 に変換
          find dist -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) | while read -r file; do
            iconv -f SHIFT_JIS -t UTF-8 "$file" > "${file}.utf8"
            mv "${file}.utf8" "$file"
          done

          # meta charset を UTF-8 に寄せる
          find dist -type f -name "*.html" | while read -r file; do
            sed -i 's/charset=Shift_JIS/charset=UTF-8/Ig' "$file"
            sed -i 's/charset=shift_jis/charset=UTF-8/Ig' "$file"
            sed -i 's/<meta charset="Shift_JIS">/<meta charset="UTF-8">/Ig' "$file"
            sed -i 's/<meta charset="shift_jis">/<meta charset="UTF-8">/Ig' "$file"
          done

          # Jekyll を通したくない場合
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4